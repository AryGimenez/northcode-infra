# --- EL VIGILANTE QUE TE AVISA AL CELULAR ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - ./uptime-kuma-data:/app/data
    ports:
      - "3001:3001" # Este lo podés abrir en el Fortinet para verlo siempre
    restart: unless-stopped


  # --- REVERSE PROXY (El que reparte el tráfico) ---
  nginx-proxy: # Nginx Proxy Manager es un proxy inverso que permite gestionar certificados SSL y dominios
    image: 'jc21/nginx-proxy-manager:latest' # Imagen a la que pertenece el contenedor
    container_name: nginx-proxy # Nombre del contenedor se ve al acer docker ps
    restart: unless-stopped # Reinicia el contenedor si se cae
    ports:
      - '80:80'   # Tráfico Web normal
      - '443:443' # Tráfico Web Seguro (SSL)
      - '81:81'   # Panel de Administración
    networks:
      - northcode-net
    volumes:
      - ./npm-data:/data # Aca se guardan los archivos del panel
      - ./npm-letsencrypt:/etc/letsencrypt # Aca se guardan los certificados SSL


  # Portainer: Gestión visual de Docker, Stacks y Logs
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Permite a Portainer ver los otros contenedores
      - portainer_data:/data # Persistencia de usuarios y configs
    ports:
      - "9443:9443" # Puerto HTTPS
    networks:
      - northcode-net
    deploy:
      resources:
        limits:
          memory: 250M # Limitamos la RAM para que no se "coma" el server

  # Beszel Agent: Monitor de hardware ultra-ligero (opcional pero recomendado)
  beszel-agent:
    image: 'henrygd/beszel-agent:latest'
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: 4567
      # KEY: "aquí-iría-tu-clave-si-instalas-el-hub-luego"

networks:
  northcode-net:
    external: true # Le dice a Docker que use la red que creamos antes

volumes:
  portainer_data: