# /stacks/production/docker-compose.yml

services:
  # --- ACTUALIZADOR DE IP ---
  duckdns_northcode: # Actualiza la IP de northcodeuy.duckdns.org
    image: lscr.io/linuxserver/duckdns:latest # Imagen a la que pertenece el contenedor
    container_name: duckdns_northcode # nombre del contenedor se ve al acer docker ps
    network_mode: host # Aese referencia a que el contenedor use la red del para poder ver la ip publica 
    environment:
      - PUID=${PUID} # identificador de usario
      - PGID=${PGID} # identificador de grupo
      - TZ=${TZ} # Zona horaria
      - SUBDOMAINS=${DUCKDNS_SUBDOMAINS} # Dominio
      - TOKEN=${DUCKDNS_TOKEN} # Token traido de DuckDNS
    restart: unless-stopped # Reinicia el contenedor si se cae

  # --- VPN SEGURA (Acceso desde Artigas) ---

  wireguard:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    environment:
      - WG_HOST=${WG_HOST} # Tu dominio
      - PASSWORD=${WG_PASSWORD} # Contraseña del panel de control
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS} # DNS por defecto
      - WG_PORT=${WG_SERVERPORT} # Puerto del servicio
    volumes:
      - ./wireguard-data:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp" # Panel de control (lo cerraremos en el Fortinet)
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
  

  
